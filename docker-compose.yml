services:
  db:
    image: postgres:17-alpine
    container_name: pet-crm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: petcrm
      POSTGRES_PASSWORD: petcrm_dev
      POSTGRES_DB: petcrm
    ports:
      - '5433:5432' # 5433 on host — a native Windows PostgreSQL already owns 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U petcrm -d petcrm']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
